<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 72" width="256" height="72" role="img" aria-label="Blockly Logo">
  <defs>
    <clipPath id="calClipDk">
      <rect x="0" y="6" width="66" height="60" rx="9"/>
    </clipPath>
  </defs>

  <!-- Calendar body -->
  <rect x="0" y="6" width="66" height="60" rx="9" fill="#2563EB"/>

  <!-- Header band -->
  <rect x="0" y="6" width="66" height="20" fill="#1D4ED8" clip-path="url(#calClipDk)"/>

  <!-- Pin tabs -->
  <rect x="15" y="0" width="8" height="15" rx="4" fill="#93C5FD"/>
  <rect x="43" y="0" width="8" height="15" rx="4" fill="#93C5FD"/>

  <!-- Schedule blocks row 1 -->
  <rect x="7"  y="32" width="15" height="10" rx="3" fill="white"/>
  <rect x="26" y="32" width="15" height="10" rx="3" fill="white" opacity="0.55"/>
  <rect x="45" y="32" width="14" height="10" rx="3" fill="white" opacity="0.3"/>

  <!-- Schedule blocks row 2 -->
  <rect x="7"  y="47" width="15" height="10" rx="3" fill="white" opacity="0.3"/>
  <rect x="26" y="47" width="15" height="10" rx="3" fill="#93C5FD"/>
  <rect x="45" y="47" width="14" height="10" rx="3" fill="white" opacity="0.55"/>

  <!-- Wordmark — white for dark backgrounds -->
  <text
    x="82"
    y="47"
    font-family="Outfit, Inter, system-ui, sans-serif"
    font-weight="700"
    font-size="34"
    fill="#F8FAFC"
    letter-spacing="-0.5"
  >Blockly</text>
</svg>
